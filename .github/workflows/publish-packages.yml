name: Publish packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint workspace
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Type-check workspace
        run: npm run typecheck

      - name: Build workspace
        run: npm run build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    env:
      NPM_CONFIG_PROVENANCE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        run: npm run build

      - name: Configure npm auth
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          fi

      - name: Select publish auth mode
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "Publishing with the npm token secret."
          else
            echo "Publishing with npm trusted publishing."
          fi

      - name: Publish workspaces
        run: |
          node <<'EOF'
          const { execFileSync } = require("node:child_process");
          const { readFileSync } = require("node:fs");

          const packageJsonPaths = [
            "packages/core/package.json",
            "packages/react/package.json",
            "packages/vue/package.json"
          ];

          for (const packageJsonPath of packageJsonPaths) {
            const manifest = JSON.parse(readFileSync(packageJsonPath, "utf8"));
            const spec = `${manifest.name}@${manifest.version}`;

            let alreadyPublished = false;

            try {
              execFileSync("npm", ["view", spec, "version"], { stdio: "ignore" });
              alreadyPublished = true;
            } catch (error) {
              alreadyPublished = false;
            }

            if (alreadyPublished) {
              console.log(`Skipping ${spec}; that version is already published.`);
              continue;
            }

            console.log(`Publishing ${spec}...`);
            execFileSync("npm", ["publish", "--workspace", manifest.name, "--provenance"], { stdio: "inherit" });
          }
          EOF
